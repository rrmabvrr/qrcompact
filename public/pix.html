<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QRCompact - Gerar QR Code Pix</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <header class="topnav">
        <a href="/" class="brand">QRCompact</a>
        <nav class="nav-links">
            <a href="/">Links Curtos</a>
            <a href="/pix.html" class="nav-active">Gerar Pix</a>
        </nav>
    </header>

    <main class="layout">
        <section class="hero card">
            <h1>Gerar QR Code Pix</h1>
            <p>Preencha os dados e gere seu QR Code e código Pix Copia e Cola gratuitamente.</p>
        </section>

        <div class="pix-grid">

            <!-- Formulário -->
            <section class="card">
                <h2 class="section-title">Dados Pix</h2>
                <form id="pix-form">

                    <div class="field-group">
                        <label for="pix-key">Chave PIX</label>
                        <div class="key-input-row">
                            <select id="key-type" aria-label="Tipo de chave Pix">
                                <option value="phone">Telefone</option>
                                <option value="cpf">CPF</option>
                                <option value="cnpj">CNPJ</option>
                                <option value="email">Email</option>
                                <option value="random">Aleatória</option>
                            </select>
                            <input id="pix-key" type="text" placeholder="(00) 00000-0000" autocomplete="off" required />
                        </div>
                    </div>

                    <div class="field-group">
                        <label for="pix-name">
                            Nome do beneficiário
                            <small>(até 25 letras)</small>
                        </label>
                        <input id="pix-name" type="text" placeholder="Seu Nome" maxlength="30" required />
                    </div>

                    <div class="field-group">
                        <label for="pix-city">
                            Cidade do beneficiário
                            <small>(até 15 letras)</small>
                        </label>
                        <input id="pix-city" type="text" placeholder="Sua Cidade" maxlength="20" required />
                    </div>

                    <div class="field-group">
                        <label for="pix-amount">
                            Valor para transferência
                            <small>(opcional)</small>
                        </label>
                        <input id="pix-amount" type="number" min="0" step="0.01" placeholder="0,00" />
                    </div>

                    <div class="field-group">
                        <label for="pix-txid">
                            Código da transferência
                            <small>(sem espaço, opcional, até 25 caracteres)</small>
                        </label>
                        <input id="pix-txid" type="text" maxlength="25" placeholder="PEDIDO001" autocomplete="off" />
                    </div>

                    <p id="pix-feedback" class="feedback" aria-live="polite"></p>

                    <button type="submit" class="btn-full">Gerar QR Code Pix</button>
                </form>
            </section>

            <!-- Coluna direita -->
            <div class="pix-right-col">

                <!-- Placeholder inicial -->
                <section id="pix-placeholder" class="card pix-placeholder">
                    <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"
                        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="3" y="3" width="7" height="7" rx="1" />
                        <rect x="3" y="14" width="7" height="7" rx="1" />
                        <rect x="14" y="3" width="7" height="7" rx="1" />
                        <rect x="5" y="5" width="3" height="3" fill="currentColor" stroke="none" />
                        <rect x="5" y="16" width="3" height="3" fill="currentColor" stroke="none" />
                        <rect x="16" y="5" width="3" height="3" fill="currentColor" stroke="none" />
                        <line x1="14" y1="14" x2="14" y2="14.01" />
                        <line x1="18" y1="14" x2="18" y2="14.01" />
                        <line x1="21" y1="14" x2="21" y2="14.01" />
                        <line x1="14" y1="18" x2="14" y2="21" />
                        <line x1="18" y1="17" x2="18" y2="21" />
                        <line x1="21" y1="17" x2="21" y2="21" />
                    </svg>
                    <p>Preencha os dados e clique em<br /><strong>Gerar QR Code Pix</strong></p>
                </section>

                <!-- Output após gerar -->
                <section id="pix-output" class="card hidden">
                    <h2 class="section-title">QR Code Pix</h2>

                    <div class="qr-center">
                        <img id="pix-qr-image" alt="QR Code Pix" />
                    </div>

                    <div class="copy-section">
                        <label>Pix Copia e Cola</label>
                        <div class="copy-row">
                            <textarea id="pix-string" readonly rows="4" aria-label="Código Pix copia e cola"></textarea>
                            <button id="copy-btn" type="button">Copiar</button>
                        </div>
                        <p id="copy-feedback" class="feedback" aria-live="polite"></p>
                    </div>

                    <a id="download-qr" class="btn-download" download="qrcode-pix.png">
                        Baixar QR Code (PNG)
                    </a>
                </section>

            </div>
        </div>
    </main>

    <script src="pix.js"></script>
</body>

</html>
